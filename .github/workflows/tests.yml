name: Tests (manual)

# Solo se ejecuta cuando lo lanzas manualmente desde la pestaña Actions de GitHub
# o vía: gh workflow run tests.yml
#
# Manual a propósito: hacemos +10 commits al día en este repo y no queremos
# desperdiciar minutos de runner en cada push. Lo lanzas cuando quieres
# validar (antes de una review, al cerrar un sprint, etc.).
on:
  workflow_dispatch:

jobs:
  repository-tests:
    name: Tests de repositorios (@DataJpaTest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25 + cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Ejecutar *RepositoryTest
        run: mvn -B test -Dtest='*RepositoryTest'

  controller-tests:
    name: Tests de controllers (@SpringBootTest + MockMvc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25 + cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Ejecutar *ControllerTest
        run: mvn -B test -Dtest='*ControllerTest'
