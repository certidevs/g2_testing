# SonarQube Community en local para ver cobertura y quality gate.
# SonarQube queda en http://localhost:9000 con su propia base de datos.
#
# Uso (desde la raiz del repo):
#   docker compose -f compose.sonar.yaml up -d     # levanta SonarQube
#   .\sonar\provision.ps1                           # prepara gate + proyecto + token (1 vez)
#   .\sonar\analyze.ps1                             # corre tests+cobertura y sube el analisis
#   docker compose -f compose.sonar.yaml down       # parar (conserva datos)
#   docker compose -f compose.sonar.yaml down -v    # parar y BORRAR datos
name: sonarqube-local
services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube-local
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonar-db:
    image: postgres:16
    container_name: sonarqube-local-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_db_data:
