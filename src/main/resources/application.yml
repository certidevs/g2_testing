spring:
  application:
    name: g2_testing
  thymeleaf:
    cache: false
    encoding: UTF-8
  messages:
    encoding: UTF-8
  datasource:
    url: jdbc:h2:mem:ecommerce_db
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
server:
  port: 9001

