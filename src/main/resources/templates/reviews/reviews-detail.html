<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalles de Reseña')}"><title>Detalles de Reseña</title></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Detalles de Reseña</h1>
        <a th:href="@{/reviews}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i> Volver a Reseñas
        </a>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <h5 class="card-title mb-0">
                            <i class="fa-solid fa-star text-warning me-2"></i>
                            <span th:text="${review.title != null ? review.title : 'Sin título'}">Título de la reseña</span>
                        </h5>

                        <div class="text-end">
                            <div class="mb-1">
                                <span th:each="i : ${#numbers.sequence(1, 5)}"
                                      th:class="${i <= review.rating ? 'fa-solid fa-star text-warning' : 'fa-regular fa-star text-muted'}"
                                      class="me-1"></span>
                            </div>
                            <small class="text-muted" th:text="|(${review.rating}/5 estrellas)|">(5/5 estrellas)</small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <h6 class="text-muted mb-2">Comentario:</h6>
                        <p class="card-text" th:text="${review.message}">Mensaje completo de la reseña...</p>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <small class="text-muted">
                                <i class="fa-regular fa-calendar me-1"></i>
                                <strong>Fecha de creación:</strong>
                                <span th:text="${#temporals.format(review.creationDate, 'dd/MM/yyyy HH:mm')}">01/01/2024 12:00</span>
                            </small>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6" th:if="${review.product}">
                            <small class="text-muted">
                                <i class="fa-solid fa-box me-1"></i>
                                <strong>Producto:</strong>
                                <a th:href="@{/products/{id}(id=${review.product.id})}"
                                   th:text="${review.product.title}"
                                   class="text-decoration-none">Nombre del producto</a>
                            </small>
                        </div>
                        <div class="col-md-6">
                            <small class="text-muted">
                                <i class="fa-solid fa-user me-1"></i>
                                <strong>Usuario:</strong>
                                <span th:text="${review.user != null ? review.user.name : 'Usuario Anónimo'}">Nombre de usuario</span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="card-title mb-3">Acciones</h6>
                    <div class="d-flex gap-2 flex-wrap">

                        <button type="button" class="btn btn-warning btn-sm text-dark fw-bold"
                                data-bs-toggle="modal" data-bs-target="#editReviewModal">
                            <i class="fa-solid fa-pen-to-square me-1"></i> Editar Reseña
                        </button>

                        <a th:href="@{/reviews/delete/{id}(id=${review.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Estás seguro de que quieres eliminar esta reseña?')">
                            <i class="fa-solid fa-trash me-1"></i> Eliminar Reseña
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6 class="card-title mb-3">
                        <i class="fa-solid fa-chart-bar text-primary me-1"></i>
                        Estadísticas
                    </h6>
                    <div class="small text-muted">
                        <div class="mb-2">
                            <i class="fa-solid fa-hashtag me-1"></i>
                            <strong>ID:</strong> <span th:text="${review.id}">UUID</span>
                        </div>
                        <div class="mb-2">
                            <i class="fa-solid fa-star me-1"></i>
                            <strong>Rating:</strong> <span th:text="${review.rating}">5</span>/5
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editReviewModal" tabindex="-1" aria-labelledby="editReviewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editReviewModalLabel">
                        <i class="fa-solid fa-pen text-warning me-2"></i>Editar Reseña
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <form th:action="@{/reviews/edit/{id}(id=${review.id})}" method="post">
                    <div class="modal-body text-start">

                        <div class="mb-3">
                            <label for="editTitle" class="form-label fw-bold">Título de la reseña:</label>
                            <input type="text" class="form-control" id="editTitle" name="title"
                                   th:value="${review.title}" required maxlength="100">
                        </div>

                        <div class="mb-3">
                            <label for="editRating" class="form-label fw-bold">Puntuación:</label>
                            <select class="form-select" id="editRating" name="rating" required>
                                <option value="5" th:selected="${review.rating == 5}">★★★★★ (5 - Excelente)</option>
                                <option value="4" th:selected="${review.rating == 4}">★★★★☆ (4 - Bueno)</option>
                                <option value="3" th:selected="${review.rating == 3}">★★★☆☆ (3 - Regular)</option>
                                <option value="2" th:selected="${review.rating == 2}">★★☆☆☆ (2 - Malo)</option>
                                <option value="1" th:selected="${review.rating == 1}">★☆☆☆☆ (1 - Pésimo)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="editMessage" class="form-label fw-bold">Tu comentario:</label>
                            <textarea class="form-control" id="editMessage" name="message" rows="4" required
                                      th:text="${review.message}"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning btn-sm text-dark fw-bold">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>
</main>
</body>
</html>
