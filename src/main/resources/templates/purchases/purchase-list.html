<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/security">

<head th:replace="~{layout/head :: head('Compras')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 py-4">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">

        <!-- TÍTULO DE LA PÁGINA -->
        <div>
            <div class="text-uppercase text-muted small fw-semibold">Gestión de pedidos</div>
            <br>
            <!-- MENSAJE DE BIENVENIDA CON NOMBRE DE USUARIO -->
            <div style="font-size: 1.5rem; font-weight: bold;" class="text-muted medium">
                ¡Hola de nuevo, <span style="font-size: 1.5rem; font-weight: bold;" th:text="${#authentication.name}"></span>!
            </div>
        </div>

        <!--  BOTÓN DE CREAR COMPRA -->
        <a th:href="@{/purchases/new}" class="btn btn-outline-primary">
            <i class="fa-solid fa-plus me-1"></i>
            Crear compra
        </a>
    </div>

    <!-- BLOQUE DE INFORMACIÓN -->
    <div class="row g-3 mb-4">

        <!-- NÚMERO DE COMPRAS REGISTRADAS -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Compras registradas</div>
                    <div style="font-size: 1.5rem" th:text="${purchases != null ? purchases.size() : 0}">0</div>
                </div>
            </div>
        </div>

    <!-- SEGUNDO BLOQUE DE INFORMACIÓN - CORREO ELECTRÓNICO -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Correo</div>
                    <div style="font-size: 1.5rem" th:text="${#authentication.principal != null ? #authentication.principal.email : 'Sin correo'}">Sin correo</div>
                </div>
            </div>
        </div>

    <!-- TERCER BLOQUE DE INFORMACIÓN - DIRECCIÓN DE ENVÍO -->
        <div class="col-md-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="text-muted small">Dirección de envío</div>
                    <!-- [PENDIENTE DE IMPLEMENTACIÓN | AGREGAR PARA QUE APAREZCA LA DIRECCIÓN DE ENVÍO AÑADIDA] -->
                    <!-- [PENDIENTE DE IMPLEMENTACIÓN | AGREGAR OPCIÓN PARA CAMBIAR LA DIRECCIÓN O AÑADIR OTRA] -->
                </div>
            </div>
        </div>

    </div>

    <!-- LISTA DE LAS COMPRAS - CONDICIÓN VISUAL SI NO HAY COMPRAS REGISTRADAS -->
    <div th:if="${purchases == null or purchases.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">

            <!-- MENSAJE -->
            <i class="fa-regular fa-clipboard fa-2x text-muted mb-3"></i>
            <h2 class="h5">No hay compras registradas</h2>

            <br>

            <!-- BOTÓN DE CREAR COMPRA -->
            <a th:href="@{/purchases/new}" class="btn btn-outline-primary">
                <i class="fa-solid fa-plus me-1"></i>
                Crear compra
            </a>
        </div>
    </div>

    <!-- LISTA DE LAS COMPRAS - CONDICIÓN VISUAL SI HAY COMPRAS REGISTRADAS -->
    <div th:if="${purchases != null and !purchases.isEmpty()}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">

                <!-- ENCABEZADOS DE TABLA -->
                <tr>
                    <th>Compra</th>
                    <th>Creación</th>
                    <th>Envío</th>
                    <th>Estado</th>
                    <th class="text-end">Total</th>
                    <th>Finalización</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="purchase : ${purchases}">

                    <!-- ID DE LA COMPRA -->
                    <td>
                        <div class="fw-semibold">Pedido</div>
                        <div class="text-muted small font-monospace" th:text="${purchase.id}"></div>
                    </td>

                    <!-- FECHA DE CREACIÓN -->
                    <td th:text="${purchase.creationDate != null ? #temporals.format(purchase.creationDate, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}"></td>

                    <!-- MODO DE ENVÍO -->
                    <td>
                        <span class="badge rounded-pill text-bg-light border"
                              th:text="${purchase.shippingMode != null ? purchase.shippingMode : 'Sin definir'}"></span>
                    </td>

                    <!-- ESTADO DE LA COMPRA -->
                    <td>
                        <span th:switch="${purchase.purchaseStatus}">
                            <span th:case="${T(com.ecommerce.model.enums.PurchaseStatus).FINISHED}" class="badge rounded-pill text-bg-success">Finalizada</span>
                            <span th:case="${T(com.ecommerce.model.enums.PurchaseStatus).INITIATED}" class="badge rounded-pill text-bg-primary">Iniciada</span>
                            <span th:case="${T(com.ecommerce.model.enums.PurchaseStatus).INACTIVE}" class="badge rounded-pill text-bg-secondary">Inactiva</span>
                            <span th:case="*" class="badge rounded-pill text-bg-light border">Sin estado</span>
                        </span>
                    </td>

                    <!-- PRECIO TOTAL -->
                    <td class="text-end fw-semibold"
                        th:text="${purchase.totalPrice != null ? #numbers.formatDecimal(purchase.totalPrice, 1, 2) + ' €' : '0,00 €'}"></td>

                    <!-- FECHA DE FINALIZACIÓN -->
                    <td th:text="${purchase.finishedDate != null ? #temporals.format(purchase.finishedDate, 'dd/MM/yyyy HH:mm') : 'Pendiente'}"></td>

                    <!-- ACCIONES -->
                    <td>
                        <div class="d-flex justify-content-end gap-2">

                            <!-- BOTÓN PARA IR A DETALLES DE LA COMPRA -->
                            <a th:href="@{/purchases/{id}(id=${purchase.id})}" class="btn btn-sm btn-outline-primary" title="Ver compra">
                                <i class="fa-regular fa-eye"></i>
                            </a>

                            <!-- BOTÓN PARA IR AL CARRITO DE LA COMPRA SI NO ESTÁ EL ESTADO DE LA COMPRA FINALIZADO -->
                            <a th:if="${purchase.purchaseStatus != T(com.ecommerce.model.enums.PurchaseStatus).FINISHED}"
                               th:href="@{/purchases/{id}/cart(id=${purchase.id})}"
                               class="btn btn-sm btn-outline-success" title="Ir al carrito">
                                <i class="fa-solid fa-cart-arrow-down"></i>
                            </a>

                            <!-- BOTÓN DE BORRAR COMPRA -->
                            <a sec:authorize="hasRole('ADMIN')" th:href="@{/purchases/delete/{id}(id=${purchase.id})}"
                               class="btn btn-sm btn-outline-danger"
                               title="Borrar compra"
                               onclick="return confirm('¿Seguro que quieres borrar esta compra?');">
                                <i class="fa-regular fa-trash-can"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
