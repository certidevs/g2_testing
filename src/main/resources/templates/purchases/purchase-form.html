<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/security">

<head th:replace="~{layout/head :: head('Crear compra')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 py-4">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>

            <!-- BOTÓN PARA VOLVER A LISTA DE COMPRAS -->
            <a th:href="@{/purchases}" class="btn btn-sm btn-outline-secondary mb-3">
                <i class="fa-solid fa-arrow-left me-1"></i>
                Volver
            </a>

            <!-- TÍTULO DE LA PÁGINA -->
            <div class="text-uppercase text-muted small fw-semibold">Nueva operación</div>
            <h1 class="mb-1">Crear compra</h1>
        </div>
    </div>

    <!-- FORMULARIO DE CREACIÓN DE COMPRA -->
    <div class="row g-4 justify-content-center">
        <div class="col-lg-8">

            <!-- FORMULARIO SE ENVÍA A /PURCHASES CON POSTMAPPING Y SE VÍNCULA AL OBJETO "PURCHASE" DEL MODELO-->
            <form th:action="@{/purchases}" method="post" th:object="${purchase}" class="card border-0 shadow-sm">
                <!-- TOKEN CSRF -->
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- TÍTULO DE FORMULARIO -->
                <div class="card-header bg-white">
                    <h2 class="h5 mb-0">Datos de la compra</h2>
                </div>
                <div class="card-body">
                    <div class="row g-3">

                        <!-- SELECT PARA CLIENTE -->
                        <div class="col-md-6">
                            <label for="user" class="form-label">Cliente</label>
                            <select class="form-select" id="user" th:field="*{user}">
                                <option value="">Selecciona usuario</option>
                                <option th:each="user : ${users}"
                                        th:value="${user.id}"
                                        th:text="${user.name != null and user.lastName != null ? user.name + ' ' + user.lastName : user.username}"></option>
                            </select>
                        </div>

                        <!-- SELECT PARA MODO DE ENVÍO-->
                        <div class="col-md-6">
                            <label for="shippingMode" class="form-label">Modo de envío</label>
                            <select class="form-select" id="shippingMode" th:field="*{shippingMode}">
                                <option value="">Selecciona envío</option>
                                <option value="STANDARD">Estándar</option>
                                <option value="EXPRESS">Express</option>
                                <option value="PREMIUM">Premium</option>
                            </select>
                        </div>

                        <!-- [PENDIENTE DE AÑADIR COMENTARIO ADICIONAL PARA ESPECIFICACIONES DE ENVÍO] -->

                        <!-- [PENDIENTE DE DISCUTIR SI AGREGAR CARRITO DENTRO DE LA CREACIÓN DE LA COMPRA]-->

                        <!-- [PENDIENTE DE DISCUTIR SI AGREGAR LA DIRECCIÓN ADRESS DENTRO DE ESTA VISTA] -->

                    </div>
                </div>

                <!-- SECCIÓN DEBAJO DE FORMULARIO -->
                <div class="card-footer bg-white d-flex flex-column flex-sm-row justify-content-end gap-2">

                    <!-- BOTÓN CANCELAR -->
                    <a th:href="@{/purchases}" class="btn btn-outline-secondary">
                        Cancelar
                    </a>

                    <!-- BOTÓN CREAR COMPRA -->
                    <button type="submit" class="btn btn-primary">
                        <i class="fa-solid fa-check me-1"></i>
                        Crear compra
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
