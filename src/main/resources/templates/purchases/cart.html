<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/security">

<head th:replace="~{layout/head :: head('Carrito')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 py-4">
    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>

            <!-- BOTÓN DE VOLVER -->
            <a th:href="@{/purchases}" class="btn btn-sm btn-outline-secondary mb-3">
                <i class="fa-solid fa-arrow-left me-1"></i>
                Volver
            </a>

            <!-- TÍTULO DE LA PÁGINA -->
            <div class="text-uppercase text-muted small fw-semibold">Compra en curso</div>
            <h1 class="mb-1">Carrito</h1>
        </div>

        <!-- BOTÓN PARA FINALIZAR COMPRA -->
        <a th:if="${cart != null}" th:href="@{/purchases/{id}/finish(id=${cart.id})}" class="btn btn-success">
            <i class="fa-solid fa-check me-1"></i>
            Finalizar compra
        </a>
    </div>

    <!-- CONDICIÓN VISUAL SI EL CARRITO ESTÁ VACÍO -->
    <div th:if="${cart == null}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">

            <!-- MENSAJE PRINCIPAL -->
            <h2 class="h5">
                ¿No has empezado todavía tu compra?
            </h2>

            <br>

            <!-- BOTÓN DE VOLVER A PRODUCTOS -->
            <div class="row">
                <div class="col">
                    <a href="/products" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-bag-shopping"></i>
                        Volver a productos
                    </a>
                </div>
            </div>

            <!-- BOTÓN DE VOLVER A EL LISTADO DE COMPRAS -->
            <div class="row my-3">
                <div class="col">
                    <a href="/purchases" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-cart-shopping"></i>
                        Volver a compras
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- CONDICIÓN VISUAL SI EL CARRITO NO ESTÁ VACÍO -->
    <div th:if="${cart != null}">
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="text-muted small">ID de la compra</div>
                        <div class="font-monospace small text-break" th:text="${cart.id}"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="text-muted small">Productos</div>
                        <div class="h4 mb-0" th:text="${lines != null ? lines.size() : 0}">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="text-muted small">Total</div>
                        <div class="h4 mb-0"
                             th:text="${cart.totalPrice != null ? #numbers.formatDecimal(cart.totalPrice, 1, 2) + ' €' : '0,00 €'}"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div th:if="${lines == null or lines.isEmpty()}" class="card-body text-center py-5">
                <i class="fa-solid fa-basket-shopping fa-2x text-muted mb-3"></i>
                <h2 class="h5">Todavía no hay productos</h2>
            </div>

            <div th:if="${lines != null and !lines.isEmpty()}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Producto</th>
                        <th class="text-center">Cantidad</th>
                        <th class="text-end">Precio unitario</th>
                        <th class="text-end">Subtotal</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="line : ${lines}">
                        <td>
                            <div class="fw-semibold" th:text="${line.product.title}"></div>
                            <div class="text-muted small" th:text="${line.product.isbn != null ? line.product.isbn : 'Sin referencia'}"></div>
                        </td>
                        <td class="text-center">
                            <span class="badge rounded-pill text-bg-light border" th:text="${line.quantity}"></span>
                        </td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(line.product.price, 1, 2) + ' €'}"></td>
                        <td class="text-end fw-semibold" th:text="${#numbers.formatDecimal(line.product.price * line.quantity, 1, 2) + ' €'}"></td>
                    </tr>
                    </tbody>
                    <tfoot class="table-light">
                    <tr>
                        <th colspan="3" class="text-end">Total</th>
                        <th class="text-end" th:text="${cart.totalPrice != null ? #numbers.formatDecimal(cart.totalPrice, 1, 2) + ' €' : '0,00 €'}"></th>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
