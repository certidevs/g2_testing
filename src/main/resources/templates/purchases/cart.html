<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Cart')}"></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <h1 class="mb-3">Cart</h1>

    <div th:if="${cart == null}" class="alert alert-info">
        Your cart is empty.
    </div>

    <div th:if="${cart != null}">
        <h5>
            Purchase ID:
            <span th:text="${cart.id}"></span>
        </h5>

        <div class="table-responsive">
            <table class="table table-hover align-middle table-bordered border-success">
                <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="line : ${lines}">
                    <td th:text="${line.product.title}"></td>
                    <td th:text="${line.quantity}"></td>
                    <td th:text="${#numbers.formatDecimal(line.product.price * line.quantity, 1, 2)}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <a th:href="@{/purchases}" class="btn btn-secondary">Back</a>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
