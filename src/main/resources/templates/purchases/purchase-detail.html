<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Purchase Details')}"><title>Purchase Lines</title></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
<h1>Purchase Details</h1>

<div class="mb-3">
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="card-title">
                <i class="fa-solid fa-receipt text-primary me-2"></i>
                Purchase ID:
                <span th:text="${purchase.id}">0</span>
            </h5>

            <a th:href="@{/purchases}"
                class="btn btn-primary">
                <i class="fa-solid fa-list me-1"></i>
                Go back to purchases
            </a>
        </div>
    </div>
</div>

    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>

</main>
</body>
</html>
