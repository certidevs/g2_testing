<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Purchase Details')}"><title>Detalles de la compra</title></head>

<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1">
    <h1>Detalles de la compra</h1>

    <div class="mb-3">
        <div class="card shadow-sm">
            <div class="card-body">

                <h5 class="card-title">
                    <i class="fa-solid fa-receipt text-primary me-2"></i>
                    ID de la compra:
                    <span th:text="${purchase.id}"></span>
                </h5>

                <h5 class="card-title">
                    Estado de pago:
                </h5>

                <div class="alert alert-light border" th:switch="${purchase.paymentStatus}">
                    <span class="btn btn-warning disabled" th:case="${T(com.ecommerce.model.enums.PaymentStatus).PENDING}"> <b>PENDIENTE</b></span>
                    <span class="btn btn-success disabled" th:case="${T(com.ecommerce.model.enums.PaymentStatus).PAID}"> <b>PAGADO</b></span>
                    <span class="btn btn-danger disabled" th:case="${T(com.ecommerce.model.enums.PaymentStatus).FAILED}"> <b>FALLIDO</b></span>
                    <span class="btn btn-outline-dark disabled" th:case="*"> Error.</span>
                </div>


                <p th:text="'Precio total de compra: ' + ${purchase.totalPrice}"></p>

                <h5 class="card-title">
                    <i class="fa-solid fa-comment text-primary me-2"></i>
                    Comentario opcional para la compra:
                    <span th:text="${purchase.getUserComment()}"></span>
                </h5>

                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <div class="mb-3">
                            <a th:href="@{/purchases/{id}/cart(id=${purchase.id})}" class="btn btn-primary">
                                <i class="fa-solid fa-cart-shopping me-1"></i>
                                Ir al carrito
                            </a>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <a th:href="@{/purchases}"
                       class="btn btn-primary">
                        <i class="fa-solid fa-list me-1"></i>
                        Volver a la lista de compras
                    </a>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle table-bordered border-success">
                <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio del producto</th>
                    <th>Precio total</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="line : ${lines}">
                    <td th:text="${line.product.getTitle()}"></td>
                    <td th:text="${line.quantity}"></td>
                    <td class="text-muted small" th:text="${#numbers.formatDecimal(line.product.price * line.quantity, 1, 2)}"></td>
                    <td th:text="${purchase.totalPrice}"></td>
                    <td>
                        <a th:href="@{/purchases/{purchaseId}/lines/add/{productId}(purchaseId=${purchase.id}, productId=${line.product.id})}" class="text-decoration-none">
                            <button class="btn btn-sm btn-light border">
                                <i class="fa-solid fa-plus text-success"></i>
                            </button>
                        </a>

                        <a th:href="@{/purchases/{purchaseId}/lines/remove/{productId}(purchaseId=${purchase.id}, productId=${line.product.id})}" class="text-decoration-none">
                            <button class="btn btn-sm btn-light border">
                                <i class="fa-solid fa-minus text-danger"></i>
                            </button>
                        </a>
                    </td>

                </tr>

                </tbody>
            </table>
        </div>

        <footer th:replace="~{layout/footer :: footer}"></footer>
        <script th:replace="~{layout/footer :: scripts}"></script>
    </div>
</main>
</body>
</html>
