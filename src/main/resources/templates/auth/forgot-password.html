<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
</head>
<body>

<h1>Recuperar contraseña</h1>

<p>Introduce tu email y generaremos un enlace para restablecer tu contraseña.</p>

<div th:if="${message}">
    <p th:text="${message}"></p>
</div>

<div th:if="${resetLink}">
    <p><strong>MVP - enlace simulado:</strong></p>
    <a th:href="@{${resetLink}}" th:text="${resetLink}"></a>
</div>

<form th:action="@{/forgot-password}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>

    <button type="submit">Enviar enlace</button>
</form>

<a th:href="@{/login}">Volver al login</a>

</body>
</html>
