<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/head :: head('Error 500')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 py-4">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <h1 class="mt-5 mb-4 fw-bold"> <i class="fa-solid fa-triangle-exclamation"></i> Error 404. </h1>
    </div>

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <h1 class="mt-5 mb-4 fw-bold">
            El recurso al que has intentado dirigirte no se ha encontrado.
        </h1>
    </div>

    <br><br>

    <div class="container text-center">

        <!-- BOTÓN DE VOLVER A PRODUCTOS -->
        <div class="row">
            <div class="col">
                <a href="/products" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-bag-shopping"></i>
                    Volver a productos
                </a>
            </div>
        </div>

        <!-- BOTÓN DE VOLVER A EL LISTADO DE COMPRAS -->
        <div class="row my-3">
            <div class="col">
                <a href="/purchases" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-cart-shopping"></i>
                    Volver a compras
                </a>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
