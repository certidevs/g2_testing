<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${categoryId != null} ? 'Editar categoría' : 'Crear categoría'">Formulario categoría</title>
</head>
<body>
<div class="container">
    <h1 th:text="${categoryId != null} ? 'Editar categoría' : 'Crear categoría'">Formulario categoría</h1>

    <form th:object="${category}"
          th:action="@{${formAction}}"
          method="post" novalidate>

        <!-- Errores globales: dentro del form para que #fields pueda acceder al BindingResult -->
        <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
        </div>

        <!-- Si usas PUT para actualizar, habilita HiddenHttpMethodFilter y descomenta -->
        <input type="hidden" name="_method" value="put" th:if="${categoryId != null}"/>

        <div class="form-group">
            <label for="name">Nombre</label>
            <input id="name" type="text" th:field="*{name}" placeholder="Ej: Tecnología" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label for="slug">Slug</label>
            <input id="slug" type="text" th:field="*{slug}" placeholder="Ej: tecnologia" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
        </div>

        <div class="form-group">
            <label for="description">Descripción</label>
            <textarea id="description" th:field="*{description}" placeholder="Descripción de la categoría" class="form-control"></textarea>
            <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="form-group">
            <label for="parentId">Categoría padre</label>
            <select id="parentId" th:field="*{parentId}" class="form-control">
                <option value="">Sin padre - Categoría raíz</option>

                <option th:each="parent : ${parentCategories}"
                        th:value="${parent.id}"
                        th:text="${parent.name}"
                        th:disabled="${categoryId != null} ? ${parent.id == categoryId} : false">
                    Categoría
                </option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('parentId')}" th:errors="*{parentId}"></div>
        </div>

        <div class="form-group form-check">
            <input id="active" type="checkbox" th:field="*{active}" class="form-check-input"/>
            <label for="active" class="form-check-label">Categoría activa</label>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary" th:text="${categoryId != null} ? 'Actualizar' : 'Crear'">Guardar</button>
            <a th:href="@{/categories}" class="btn btn-secondary">Volver</a>
        </div>
    </form>
</div>

</body>
</html>
