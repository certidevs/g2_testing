<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalles categorias</title>
</head>
<body>
<div class="container">
    <h1>Detalle de categoría</h1>

    <div class="field">
        <span class="label">Nombre:</span>
        <span th:text="${category.name}">Nombre</span>
    </div>

    <div class="field">
        <span class="label">Slug:</span>
        <span th:text="${category.slug}">slug</span>
    </div>

    <div class="field">
        <span class="label">Descripción:</span>
        <span th:text="${category.description != null ? category.description : '-'}">Descripción</span>
    </div>

    <div class="field">
        <span class="label">Categoría padre:</span>
        <span th:text="${category.parentName != null ? category.parentName : 'Categoría raíz'}">Padre</span>
    </div>

    <div class="field">
        <span class="label">Activa:</span>
        <span th:text="${category.active} ? 'Sí' : 'No'">Sí/No</span>
    </div>

    <div class="field">
        <span class="label">Subcategorías:</span>

        <!-- Manejo seguro cuando children es null o vacío -->
        <span th:if="${category.children == null or #lists.isEmpty(category.children)}">No tiene subcategorías.</span>

        <ul th:if="${category.children != null and !#lists.isEmpty(category.children)}">
            <li th:each="child : ${category.children}">
                <a th:href="@{/categories/{id}(id=${child.id})}" th:text="${child.name}">Subcategoría</a>
            </li>
        </ul>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3">
        <div class="col" th:each="product : ${products}">
            <div class="card card-restaurant h-100 shadow-sm">
                <div class="card-img-top" style="height: 200px; overflow: hidden; background-color: #f5f5f5;">
                    <img th:src="${product.imageUrl}"
                         th:alt="${product.title}"
                         class="w-100 h-100 object-fit-cover"
                         style="object-fit: cover;">
                </div>
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="fa-solid fa-store text-primary me-2"></i>
                        <span th:text="${product.title}">Nombre</span>
                    </h5>
                    <p class="card-text">
                                <span class="badge bg-success">
                                    <i class="fa-solid fa-euro-sign me-1"></i>
                                    <span th:text="${product.price}">0</span>
                                </span>
                        <span class="badge bg-success">
                                    <span th:text="${product.brand != null ? product.brand.name : 'Sin marca'}">NotFound</span>
                                </span>
                        <span class="badge bg-info">
                                <i class="fa-solid fa-shopping-bag me-1"></i>
                                <span th:text="${product.purchase != null ? product.purchase.id : 'No comprado'}">Sin compra</span>
                                </span>

                        <a th:href="@{/purchase/add/{id}(id=${product.id})}"
                           class="btn btn-success btn-sm">
                            <i class="fa-solid fa-shopping-cart me-1"></i> Comprar
                        </a>


                </div>
                <div class="card-footer bg-transparent border-0 pt-0">
                    <a th:href="@{/products/{id}(id=${product.id})}"
                       class="btn btn-outline-primary btn-sm w-100">
                        <i class="fa-regular fa-eye me-1"></i> Ver Producto
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <a th:href="@{/categories}" class="btn-back">Volver</a>
        <a th:href="@{/categories/{id}/edit(id=${category.id})}" class="btn-edit">Editar</a>
    </div>
</div>

</body>
</html>
