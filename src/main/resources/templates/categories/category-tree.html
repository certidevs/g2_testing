<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Árbol de categorías')}">>
    <meta charset="UTF-8">
    <title>Arbol de categorias</title>
</head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar::navbar}"></nav>
<main class="flex-grow-1">
    <div class="container py-5">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="fw-bold mb-1">Árbol de categorías</h1>
                <p class="text-muted mb-0">
                    Visualiza la estructura jerárquica de tus categorías.
                </p>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/categories}" class="btn btn-outline-secondary">
                    Volver al listado
                </a>
                <a th:href="@{/categories/new}" class="btn btn-primary">
                    Crear categoría
                </a>
            </div>
        </div>

        <div th:if="${categories == null or #lists.isEmpty(categories)}"
             class="alert alert-info d-flex align-items-center mb-0"
             role="alert">
            <span>No hay categorías registradas.</span>
        </div>

        <div th:if="${categories != null and !#lists.isEmpty(categories)}"
             class="card shadow-sm border-0">

            <div class="card-header bg-white border-bottom">
                <h2 class="h5 mb-0">Listado jerárquico</h2>
            </div>

            <div class="card-body">
                <ul class="list-unstyled mb-0">
                    <li th:each="category : ${categories}" class="mb-3">

                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 p-3 border rounded bg-light">
                            <div class="d-flex flex-wrap align-items-center gap-2">
                                <span class="fw-semibold" th:text="${category.name}">
                                    Categoría
                                </span>

                                <span class="badge text-bg-secondary" th:text="${'/' + category.slug}">
                                    /slug
                                </span>

                                <span th:if="${!category.active}" class="badge text-bg-warning">
                                    Inactiva
                                </span>
                            </div>

                            <a th:href="@{/categories/{id}(id=${category.id})}"
                               class="btn btn-sm btn-outline-primary">
                                Ver
                            </a>
                        </div>

                        <div th:if="${category.children != null and !#lists.isEmpty(category.children)}"
                             th:replace="~{this :: childrenList(${category.children})}">
                        </div>

                    </li>
                </ul>
            </div>
        </div>

    </div>
</main>

<div th:fragment="childrenList(children)">
    <ul class="list-unstyled border-start ms-3 ms-md-4 ps-3 ps-md-4 mt-3">
        <li th:each="child : ${children}" class="mb-3">

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 p-3 border rounded">
                <div class="d-flex flex-wrap align-items-center gap-2">
                    <span class="fw-semibold" th:text="${child.name}">
                        Subcategoría
                    </span>

                    <span class="badge text-bg-secondary" th:text="${'/' + child.slug}">
                        /slug
                    </span>

                    <span th:if="${!child.active}" class="badge text-bg-warning">
                        Inactiva
                    </span>
                </div>

                <a th:href="@{/categories/{id}(id=${child.id})}"
                   class="btn btn-sm btn-outline-primary">
                    Ver
                </a>
            </div>

            <div th:if="${child.children != null and !#lists.isEmpty(child.children)}"
                 th:replace="~{this :: childrenList(${child.children})}">
            </div>

        </li>
    </ul>
</div>
<footer th:replace="~{layout/footer::footer}"></footer>
<script th:replace="~{layout/footer::scripts}"></script>
</body>
</html>
