<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle chat IA')}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center gap-3 mb-4">
            <div>
                <p class="text-uppercase text-muted small fw-bold mb-1">Historial IA</p>
                <h1 class="h3 fw-bold mb-0" th:text="${conversation.title}">Consulta</h1>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/chatbot/history}">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="chatbot-panel shadow-sm">
            <div class="chatbot-messages chatbot-history-messages">
                <div th:each="message : ${conversation.messages}"
                     class="chat-message"
                     th:classappend="${message.sender == 'USER'} ? ' user' : ' bot'">
                    <div class="chat-bubble">
                        <p class="small fw-bold mb-1"
                           th:text="${message.sender == 'USER'} ? 'Tú' : 'Asistente IA'">Remitente</p>
                        <span th:text="${message.content}">Mensaje</span>
                        <p class="small text-muted mb-0 mt-2"
                           th:text="${#temporals.format(message.sentAt, 'dd/MM/yyyy HH:mm')}">26/05/2026 12:00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
