<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/security">

<head th:replace="~{layout/head :: head('Añadir nueva dirección')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/navbar :: navbar}"></nav>

<main class="container flex-grow-1 py-4">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>

            <!-- BOTÓN PARA VOLVER A LISTA DE DIRECCIONES DE ENVÍO -->
            <a th:href="@{/addresses}" class="btn btn-sm btn-outline-secondary mb-3">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver al listado
            </a>

            <!-- TÍTULO DE LA PÁGINA -->
            <div class="text-uppercase text-muted small fw-semibold">Nueva dirección</div>
            <h1 class="mb-1">Agregar dirección de envío</h1>
            <p class="text-muted mb-0">Rellena los datos para registrar un nuevo punto de entrega o facturación.</p>
        </div>
    </div>

    <!-- FORMULARIO PARA AGREGAR NUEVA DIRECCIÓN DE ENVÍO -->
    <div class="row g-4 justify-content-center">
        <div class="col-lg-8">

            <!-- FORMULARIO SE ENVÍA A /ADDRESSES CON POSTMAPPING Y SE VÍNCULA AL OBJETO "ADDRESS" DEL MODELO-->
            <form th:action="@{/addresses}" method="post" th:object="${address}" class="card border-0 shadow-sm">

                <!-- TOKEN CSRF -->
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{usersId}">

                <!-- TÍTULO DE FORMULARIO -->
                <div class="card-header bg-white py-3">
                    <h2 class="h5 mb-0 text-dark fw-bold">
                        Datos de la dirección
                    </h2>
                </div>

                <div class="card-body p-4">
                    <div class="row g-3">

                        <!-- TIPO DE DIRECCIÓN -->
                        <div class="col-md-6">
                            <label for="addressType" class="form-label fw-semibold">Tipo de dirección</label>
                            <select class="form-select" id="addressType" th:field="*{addressType}" required>
                                <option value="">Selecciona un tipo</option>
                                <option th:each="type : ${addressTypes}"
                                        th:value="${type}"
                                        th:text="${type}">
                                </option>
                            </select>
                        </div>

                        <!-- CÓDIGO POSTAL -->
                        <div class="col-md-6">
                            <label for="zipCode" class="form-label fw-semibold">Código postal</label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="zipCode"
                                   th:field="*{zipCode}"
                                   pattern="[0-9]+" title="Por favor, introduce solo números" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('zipCode')}" th:errors="*{zipCode}"></div>
                        </div>

                        <!-- CALLE -->
                        <div class="col-md-8">
                            <label for="street" class="form-label fw-semibold">Calle / Avenida</label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="street" th:field="*{street}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('street')}" th:errors="*{street}"></div>
                        </div>

                        <!-- NÚMERO DE LA CALLE -->
                        <div class="col-md-4">
                            <label for="number" class="form-label fw-semibold">Número / Altura</label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="number"
                                   th:field="*{number}"
                                   pattern="[0-9]+" title="Por favor, introduce un número válido" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('number')}" th:errors="*{number}"></div>
                        </div>

                        <!-- COMENTARIO ADICIONAL -->
                        <div class="col-12">
                            <label for="complement" class="form-label fw-semibold">Comentario adicional <span class="text-muted fw-normal">(Opcional)</span></label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="complement" th:field="*{complement}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('complement')}" th:errors="*{complement}"></div>
                        </div>

                        <!-- CIUDAD -->
                        <div class="col-md-4">
                            <label for="city" class="form-label fw-semibold">Ciudad</label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="city" th:field="*{city}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                        </div>

                        <!-- ESTADO O PROVINCIA -->
                        <div class="col-md-4">
                            <label for="state" class="form-label fw-semibold">Estado / Provincia</label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="state" th:field="*{state}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('state')}" th:errors="*{state}"></div>
                        </div>

                        <!-- PAÍS -->
                        <div class="col-md-4">
                            <label for="country" class="form-label fw-semibold">País</label>
                            <input type="text" class="form-control" th:errorclass="is-invalid" id="country" th:field="*{country}">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></div>
                        </div>

                    </div>
                </div>


                <div class="card-footer bg-white d-flex flex-column flex-sm-row justify-content-end gap-2 py-3 px-4">

                    <!-- BOTÓN CANCELAR -->
                    <a th:href="@{/addresses}" class="btn btn-sm btn-outline-secondary">
                        Cancelar
                    </a>

                    <!-- BOTÓN DE CREAR DIRECCIÓN -->
                    <button type="submit" class="btn btn-sm btn-outline-primary">
                        <i class="fa-solid fa-floppy-disk me-1"></i> Guardar dirección
                    </button>
                </div>

            </form>
        </div>
    </div>
</main>

<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>

</body>
</html>
