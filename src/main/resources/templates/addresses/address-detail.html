<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle de Dirección')}">
</head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div th:if="${address != null}" class="card">
        <div class="card-header">
            <h5 class="card-title mb-0">
                <i class="fa-solid fa-location-dot me-2"></i>
                Detalle de Dirección
            </h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Tipo:</strong> <span th:text="${address.addressType}">PRIMARY</span></p>
                    <p><strong>Calle:</strong> <span th:text="${address.street}">Calle Principal</span></p>
                    <p><strong>Número:</strong> <span th:text="${address.number}">123</span></p>
                    <p><strong>Ciudad:</strong> <span th:text="${address.city}">Madrid</span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>Estado:</strong> <span th:text="${address.state}">Madrid</span></p>
                    <p><strong>País:</strong> <span th:text="${address.country}">España</span></p>
                    <p><strong>Código Postal:</strong> <span th:text="${address.zipCode}">28001</span></p>
                </div>
            </div>
            <div class="mt-3">
                <a th:href="@{/addresses}" class="btn btn-secondary">
                    <i class="fa-solid fa-arrow-left me-1"></i> Volver
                </a>
            </div>
        </div>
    </div>
    
    <div th:if="${address == null}" class="alert alert-danger">
        <i class="fa-solid fa-exclamation-triangle me-2"></i>
        Dirección no encontrada.
    </div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
