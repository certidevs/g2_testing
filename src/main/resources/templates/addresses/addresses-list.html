<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Direcciones')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <i class="fa-solid fa-location-dot text-primary me-2"></i>Direcciones
        </h1>
        <span class="badge bg-secondary fs-6" th:text="|${#lists.size(addresses)} resultados|">0 resultados</span>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(addresses)}">
        No hay direcciones disponibles por ahora.
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(addresses)}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Tipo</th>
                    <th>Calle</th>
                    <th>Ciudad</th>
                    <th>País</th>
                    <th>Código Postal</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="address : ${addresses}">
                    <td>
                        <span th:if="${address.addressType.name() == 'PRIMARY'}" 
                              class="badge bg-primary" th:text="${address.addressType.name()}">PRIMARY</span>
                        <span th:if="${address.addressType.name() == 'BILLING'}" 
                              class="badge bg-success" th:text="${address.addressType.name()}">BILLING</span>
                        <span th:if="${address.addressType.name() == 'SHIPPING'}" 
                              class="badge bg-info" th:text="${address.addressType.name()}">SHIPPING</span>
                        <span th:unless="${address.addressType.name() == 'PRIMARY' or address.addressType.name() == 'BILLING' or address.addressType.name() == 'SHIPPING'}" 
                              class="badge bg-secondary" th:text="${address.addressType.name()}">OTHER</span>
                    </td>
                    <td>
                        <div th:text="${address.street + ' ' + address.number}">Calle 123</div>
                        <small th:if="${address.complement}" class="text-muted" th:text="${address.complement}">Complemento</small>
                    </td>
                    <td th:text="${address.city}">Ciudad</td>
                    <td th:text="${address.country}">País</td>
                    <td th:text="${address.zipCode}">00000</td>
                    <td class="text-end">
                        <a th:href="@{/addresses/{id}(id=${address.id})}" class="btn btn-outline-primary btn-sm">
                            <i class="fa-regular fa-eye me-1"></i>Detalle
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="~{layout/footer :: footer}"></footer>
    <script th:replace="~{layout/footer :: scripts}"></script>
</main>
</body>
</html>
