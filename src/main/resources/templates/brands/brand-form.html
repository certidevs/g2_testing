<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${brandId != null} ? 'Editar marca' : 'Crear marca'">Formulario marca</title>
</head>
<body>
<div class="container">
    <h1 th:text="${brandId != null} ? 'Editar marca' : 'Crear marca'">Formulario marca</h1>

    <form th:object="${brand}"
          th:action="@{${formAction}}"
          method="post" novalidate>

        <!-- errores globales: ahora dentro del form, por eso #fields funciona -->
        <div th:if="${#fields.hasGlobalErrors()}" class="global-error">
            <p th:each="error : ${#fields.globalErrors()}" th:text="${error}"></p>
        </div>

        <input type="hidden" name="_method" value="put" th:if="${brandId != null}"/>

        <div class="form-group">
            <label for="name">Nombre</label>
            <input id="name" type="text" th:field="*{name}" placeholder="Ej: Nike" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label for="nif">NIF</label>
            <input id="nif" type="text" th:field="*{nif}" placeholder="Ej: B12345678" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('nif')}" th:errors="*{nif}"></div>
        </div>

        <div class="form-group">
            <label for="country">País</label>
            <input id="country" type="text" th:field="*{country}" placeholder="Ej: España" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('country')}" th:errors="*{country}"></div>
        </div>

        <div class="form-group">
            <label for="website">Sitio web</label>
            <input id="website" type="text" th:field="*{website}" placeholder="https://example.com" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('website')}" th:errors="*{website}"></div>
        </div>

        <div class="form-group">
            <label for="logo">Logo</label>
            <input id="logo" type="text" th:field="*{logo}" placeholder="URL del logo" class="form-control"/>
            <div class="error" th:if="${#fields.hasErrors('logo')}" th:errors="*{logo}"></div>
        </div>

        <div class="form-group form-check">
            <input id="active" type="checkbox" th:field="*{active}" class="form-check-input"/>
            <label for="active" class="form-check-label">Marca activa</label>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary" th:text="${brandId != null} ? 'Actualizar' : 'Crear'">Guardar</button>
            <a th:href="@{/brands}" class="btn btn-secondary">Volver</a>
        </div>
    </form>
</div>

</body>
</html>
