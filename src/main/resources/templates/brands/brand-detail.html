<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="container">
    <h1>Detalle de marca</h1>

    <div class="field">
        <span class="label">Nombre:</span>
        <span th:text="${brand.name}">Nombre</span>
    </div>

    <div class="field">
        <span class="label">NIF:</span>
        <span th:text="${brand.nif}">NIF</span>
    </div>

    <div class="field">
        <span class="label">País:</span>
        <span th:text="${brand.country}">País</span>
    </div>

    <div class="field">
        <span class="label">Web:</span>
        <a th:if="${brand.website != null and !#strings.isEmpty(brand.website)}"
           th:href="${brand.website}"
           th:text="${brand.website}"
           target="_blank">
            Web
        </a>
        <span th:if="${brand.website == null or #strings.isEmpty(brand.website)}">-</span>
    </div>

    <div class="field">
        <span class="label">Logo:</span>

        <div th:if="${brand.logo != null and !#strings.isEmpty(brand.logo)}">
            <img th:src="${brand.logo}" alt="Logo de la marca">
            <p th:text="${brand.logo}">URL logo</p>
        </div>

        <span th:if="${brand.logo == null or #strings.isEmpty(brand.logo)}">-</span>
    </div>

    <div class="field">
        <span class="label">Activa:</span>
        <span th:if="${brand.active}" class="active">Sí</span>
        <span th:unless="${brand.active}" class="inactive">No</span>
    </div>

    <a th:href="@{/brands}" class="btn-back">Volver</a>
    <a th:href="@{/brands/{id}/edit(id=${brand.id})}" class="btn-edit">Editar</a>
</div>
</body>
</html>
