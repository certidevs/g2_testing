<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<body>

<!-- ===== SIDEBAR OFFCANVAS ===== -->
<div th:fragment="navbar">

    <!-- Offcanvas sidebar -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarMenuLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="sidebarMenuLabel">
                <i class="fa-solid fa-bars-staggered me-2 text-primary"></i>Menú
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0">
            <ul class="list-group list-group-flush">

                <li class="list-group-item list-group-item-action">
                    <span class="text-muted small text-uppercase fw-bold px-1">Tienda</span>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/products}">
                        <i class="fa-solid fa-bowl-food text-primary"></i> Productos
                    </a>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/purchases}">
                        <i class="fa-solid fa-ticket text-success"></i> Compras
                    </a>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/reviews}">
                        <i class="fa-solid fa-star text-warning"></i> Reseñas
                    </a>
                </li>
                <li class="list-group-item list-group-item-action mt-2">
                    <span class="text-muted small text-uppercase fw-bold px-1">Mi cuenta</span>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/user/profile}">
                        <i class="fa-solid fa-user text-secondary"></i> Perfil
                    </a>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/addresses}">
                        <i class="fa-solid fa-map-location-dot text-info"></i> Direcciones
                    </a>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/favorites}">
                        <i class="fa-solid fa-heart text-danger"></i> Me gustan
                    </a>
                </li>

                <li class="list-group-item list-group-item-action mt-2">
                    <span class="text-muted small text-uppercase fw-bold px-1">Admin</span>
                </li>
                <li class="list-group-item list-group-item-action p-0">
                    <a class="d-flex align-items-center gap-2 px-3 py-2 text-decoration-none text-dark"
                       th:href="@{/h2-console}" target="_blank">
                        <i class="fa-solid fa-database text-muted"></i> H2 Console
                    </a>
                </li>

            </ul>
        </div>
    </div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">

            <!-- Hamburger que abre el sidebar -->
            <button class="btn btn-outline-secondary me-2 border-0"
                    type="button"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarMenu"
                    aria-controls="sidebarMenu"
                    aria-label="Abrir menú">
                <i class="fa-solid fa-bars text-white fs-5"></i>
            </button>

            <!-- Logo / Brand -->
            <a class="navbar-brand d-flex align-items-center" th:href="@{/products}">
                <img th:src="@{/images/logo1.png}" alt="Logo" width="32" height="32" class="me-2 rounded-3">
                <span>G2 Store</span>
            </a>

            <!-- Toggler móvil para navbar collapse -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">

                <!-- Links principales -->
                <ul class="navbar-nav me-2">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/products}">
                            <i class="fa-solid fa-bowl-food me-1"></i> Productos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/purchases}">
                            <i class="fa-solid fa-ticket me-1"></i> Compras
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/filters}">
                            <i class="bi bi-funnel-fill me-1"></i> Filtros
                        </a>
                    </li>
                </ul>

                <!-- Buscador centrado -->
                <form class="d-flex mx-auto" th:action="@{/products/search}" method="get" style="width: 40%;">
                    <input class="form-control me-2" type="search" name="query"
                           placeholder="Buscar productos..." aria-label="Buscar">
                    <button class="btn btn-outline-light" type="submit">
                        <i class="fa-solid fa-search"></i>
                    </button>
                </form>

                <!-- Iconos derecha -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link position-relative" th:href="@{/cart}">
                            <i class="fa-solid fa-shopping-cart"></i>
                            <span class="badge bg-danger position-absolute top-0 start-100 translate-middle"
                                  th:if="${cartCount > 0}" th:text="${cartCount}">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" th:href="@{/favorites}">
                            <i class="fa-solid fa-heart"></i>
                            <span class="badge bg-danger position-absolute top-0 start-100 translate-middle"
                                  th:if="${favoritesCount > 0}" th:text="${favoritesCount}">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/user/profile}">
                            <i class="fa-solid fa-user"></i>
                        </a>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

</div>
</body>
</html>
