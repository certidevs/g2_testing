<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
             <img th:src="@{/images/logo.png}" alt="Products" width="32"
                 height="32" class="me-2 rounded-3">
       <span>Products</span>
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
<!--                <li class="nav-item">-->
<!--                    <a class="nav-link" th:href="@{/categories}">-->
<!--                        <i class="fa-solid fa-store me-1"></i> Category-->
<!--                    </a>-->
<!--                </li>-->
<!--              <li class="nav-item">-->
<!--                   <a class="nav-link" th:href="@{/products}">-->
<!--                        <i class="fa-solid fa-bowl-food me-1"></i> Products-->
<!--                    </a>-->
<!--               </li>-->
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle"
                       th:href="@{/products}"
                       role="button"
                       data-bs-toggle="dropdown"
                       aria-expanded="false">
                        <i class="fa-solid fa-bowl-food me-1"></i> Products
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/products}">Moda</a></li>
                        <li><a class="dropdown-item" href="#">Tecnologia</a></li>
                    </ul>
                </div>

                <!--                <li class="nav-item">-->
<!--                    <a class="nav-link" th:href="@{/reviews}">-->
<!--                        <i class="fa-solid fa-star me-1"></i> Reviews-->
<!--                    </a>-->
<!--                </li>-->
                <li class="nav-item" >
                    <a class="nav-link" th:href="@{/purchases}">
                        <i class="fa-solid fa-ticket me-1"></i> Purchases
                    </a>
                </li>
            </ul>
            <!-- Buscador en el centro -->
            <form class="d-flex mx-auto" th:action="@{/products/search}" method="get" style="width: 40%;">
                <input class="form-control me-2" type="search" name="query" placeholder="Buscar productos..." aria-label="Search">
                <button class="btn btn-outline-light" type="submit">
                    <i class="fa-solid fa-search"></i>
                </button>
            </form>

            <!-- Iconos en la derecha -->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/profile}">
                        <i class="fa-solid fa-user"></i> Usuario
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/favorites}">
                        <i class="fa-solid fa-heart"></i> Me gustan
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle" th:if="${favoritesCount > 0}" th:text="${favoritesCount}">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link position-relative" th:href="@{/cart}">
                        <i class="fa-solid fa-shopping-cart"></i> Carrito
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle" th:if="${cartCount > 0}" th:text="${cartCount}">0</span>
                    </a>
                </li>
            </ul>
        </div>

    </div>

</body>
</html>
