     <!DOCTYPE html>
     <html lang="es" xmlns:th="http://www.thymeleaf.org">
     <head th:replace="~{layout/head :: head('Detalle de Producto')}">
     </head>
     <body class="d-flex flex-column min-vh-100">
     <nav th:replace="~{layout/navbar :: navbar}"></nav>
     <main class="container flex-grow-1">
         <div th:if="${product != null}" class="row">
             <div class="col-md-8">
                 <div class="d-flex justify-content-between align-items-start mb-3">
                     <div>
                         <h1 class="mb-2" th:text="${'Producto: ' + product.title}">Producto</h1>
                         <p class="mb-2 fs-5" th:text="${product.longDescription != null ? product.longDescription : 'Sin descripción'}">Descripción</p>
                         <a class="btn btn-danger btn-sm" th:href="@{/products/deactivate/{id}(id=${product.id})}">
                             <i class="fa-solid fa-ban"></i> Desactivar
                         </a>
                         <a class="btn btn-success btn-sm" th:href="@{/products/activate/{id}(id=${product.id})}">
                             <i class="fa-solid fa-ban"></i> Activar
                         </a>

                         <span class="badge bg-success me-1" style="font-size: 1.5rem; padding: 10px 15px;">

                         <i class="fa-solid fa-euro-sign me-1"></i>
                         <span th:text="${product.price != null ? product.price  : 'GRATIS'}"></span>
                       </span>
                         <span class="badge bg-light text-dark border me-1">
                           Stock: <span th:text="${product.stock}">0</span> uds
                            </span>
                         <p th:if="${product.brand != null}" class="mt-2">
                             <strong>Marca:</strong> <span th:text="${product.brand.name}">Sin marca</span>
                         </p>
                         <p th:if="${product.subcategory != null}" class="mt-2">
                             <strong>Categoría:</strong> <span th:text="${product.subcategory.name}">Sin categoría</span>
                     </div>
                 </div>

                 <div th:if="${product.imageUrl != null}" class="mb-3">
                     <img th:src="${product.imageUrl}" alt="Imagen del producto" class="img-fluid rounded">
                 </div>

                 <p th:if="${product.shortDescription != null}" th:text="${product.shortDescription}"></p>
             </div>
             <div class="col-md-4">

                      <div class="mt-3">
                          <a th:href="@{/purchases/add/{id}(id=${product.id})}" class="btn btn-success me-2">
                              <i class="fa-solid fa-shopping-cart me-1"></i> Comprar ahora
                          </a>
                          <a th:href="@{/purchases/add/{id}(id=${product.id})}" class="btn btn-outline-primary">
                              <i class="fa-solid fa-cart-plus me-1"></i> Añadir al carrito
                          </a>
                          <form th:action="@{/favorites/add/{id}(id=${product.id})}" method="post" style="display: inline;">
                              <button type="submit" class="btn btn-outline-danger"
                                      onclick="return confirm('¿Añadir a favoritos?')">
                                  <i class="fa-solid fa-heart me-1"></i> Favorito
                              </button>
                          </form>

                          <div class="mb-3">
                         <span th:if="${product.stock > 10}" class="badge bg-success">
                          Disponible (<span th:text="${product.stock}"></span> uds)
                          </span>

                              <span th:if="${product.stock > 0 && product.stock <= 10}" class="badge bg-warning text-dark">
                             ¡Últimas <span th:text="${product.stock}"></span> unidades!
                              </span>

                              <span th:if="${product.stock == 0}" class="badge bg-danger">
                               Agotado
                                </span>
                          </div>

                      </div>

                 <h3>Reseñas</h3>
                 <div th:if="${reviews != null and !reviews.isEmpty()}" th:each="review : ${reviews}">
                     <div class="card mb-2">
                         <div class="card-body">
                             <p th:text="${review.message}">Comentario</p>
                             <div class="rating-stars">
    <span th:each="i : ${#numbers.sequence(1, 5)}" 
          th:class="${i <= review.rating} ? 'star-filled' : 'star-empty'"
          class="star">★</span>
    <span th:text="${review.rating + '/5'}">5/5</span>
</div>
                         </div>
                     </div>
                 </div>
                 <p th:if="${reviews == null or reviews.isEmpty()}">No hay reseñas disponibles.</p>
             </div>
         </div>
         <div th:if="${product == null}" class="alert alert-danger">
             Producto no encontrado.
         </div>
     </main>
     <footer th:replace="~{layout/footer :: footer}"></footer>
     <script th:replace="~{layout/footer :: scripts}"></script>
     </body>
     </html>
