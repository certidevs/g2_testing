<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Gestion de Usuarios')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h1 class="mb-0">
			<i class="fa-solid fa-user-shield text-primary me-2"></i>Gestion de Usuarios
		</h1>
		<span class="badge bg-secondary fs-6" th:text="|${#lists.size(users)} resultados|">0 resultados</span>
	</div>

	<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
	<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

	<div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
		No hay usuarios registrados.
	</div>

	<div class="card shadow-sm" th:unless="${#lists.isEmpty(users)}">
		<div class="table-responsive">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
				<tr>
					<th>Nombre</th>
					<th>Email</th>
					<th>Rol</th>
					<th>Estado</th>
					<th class="text-end">Acciones</th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="user : ${users}">
					<td>
						<div class="fw-semibold" th:text="|${user.name} ${user.lastName}|">Nombre Apellido</div>
						<small class="text-muted" th:text="${user.phone}">123456789</small>
					</td>
					<td th:text="${user.email}">email@example.com</td>
					<td>
						<span class="badge"
							  th:classappend="${user.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
							  th:text="${user.role.name()}">ROLE</span>
					</td>
					<td>
						<span class="badge"
							  th:classappend="${user.active ? 'bg-success' : 'bg-secondary'}"
							  th:text="${user.active ? 'ACTIVO' : 'INACTIVO'}">ACTIVO</span>
					</td>
					<td class="text-end">
						<a th:href="@{|/admin/users/${user.id}/edit?adminEmail=${adminEmail}|}"
						   class="btn btn-sm btn-outline-primary me-1">
							<i class="fa-solid fa-pen-to-square"></i> Editar
						</a>

						<form th:action="@{|/admin/users/${user.id}/toggle-status|}" method="post" class="d-inline">
							<input type="hidden" name="adminEmail" th:value="${adminEmail}">
							<button type="submit" class="btn btn-sm me-1"
									th:classappend="${user.active ? 'btn-outline-warning' : 'btn-outline-success'}">
								<i class="fa-solid" th:classappend="${user.active ? ' fa-user-slash' : ' fa-user-check'}"></i>
								<span th:text="${user.active ? 'Desactivar' : 'Activar'}">Desactivar</span>
							</button>
						</form>

						<form th:action="@{|/admin/users/${user.id}/delete|}" method="post" class="d-inline"
							  onsubmit="return confirm('Esta accion desactivara al usuario. Continuar?');">
							<input type="hidden" name="adminEmail" th:value="${adminEmail}">
							<button type="submit" class="btn btn-sm btn-outline-danger">
								<i class="fa-solid fa-trash"></i> Borrar
							</button>
						</form>
					</td>
				</tr>
				</tbody>
			</table>
		</div>
	</div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
