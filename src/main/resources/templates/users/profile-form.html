<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Editar Perfil')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <i class="fa-solid fa-user-edit text-primary me-2"></i>Editar Perfil
        </h1>
        <a th:href="@{/profile}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/profile/update}" method="post" th:object="${user}">
                <div class="row">
                    <div class="col-md-6">
                        <h5 class="card-title mb-4">Información Personal</h5>
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Apellidos</label>
                            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="phone" th:field="*{phone}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="gender" class="form-label">Género</label>
                            <select class="form-select" id="gender" th:field="*{gender}" required>
                                <option value="">Seleccionar...</option>
                                <option th:each="gender : ${T(com.ecommerce.model.enums.Gender).values()}" 
                                        th:value="${gender}" 
                                        th:text="${gender.name()}"
                                        th:selected="${gender == user.gender}">Género</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <h5 class="card-title mb-4">Información Adicional</h5>
                        
                        <div class="mb-3">
                            <label for="birthday" class="form-label">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" id="birthday" name="birthday"
                                   th:value="${user.birthday != null ? #temporals.format(user.birthday, 'yyyy-MM-dd') : ''}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="paymentMethod" class="form-label">Método de Pago Preferido</label>
                            <select class="form-select" id="paymentMethod" th:field="*{paymentMethod}">
                                <option value="">Seleccionar...</option>
                                <option th:each="method : ${T(com.ecommerce.model.enums.PaymentMethod).values()}" 
                                        th:value="${method}" 
                                        th:text="${method.name()}"
                                        th:selected="${method == user.paymentMethod}">Método</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label text-muted">Rol</label>
                            <p class="form-control-plaintext">
                                <span class="badge" 
                                      th:classappend="${user.role != null and user.role.name() == 'ROLE_ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                      th:text="${user.role != null ? user.role.name().replace('ROLE_', '') : 'CUSTOMER'}">ROLE</span>
                                <small class="text-muted ms-2">(No modificable)</small>
                            </p>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label text-muted">Fecha de Creación</label>
                            <p class="form-control-plaintext" th:text="${#temporals.format(user.creationDate, 'dd/MM/yyyy HH:mm')}">01/01/2023 12:00</p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4 pt-4 border-top">
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/profile}" class="btn btn-secondary">
                            <i class="fa-solid fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
<script th:replace="~{layout/footer :: scripts}"></script>
</body>
</html>
