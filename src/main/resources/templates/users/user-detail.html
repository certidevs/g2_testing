<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Detalle de Usuario')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <i class="fa-solid fa-user text-primary me-2"></i>Detalle de Usuario
        </h1>
        <a href="/users" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="card-title mb-4">Información Personal</h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Nombre Completo</label>
                        <p class="form-control-plaintext fw-semibold" th:text="|${user.name} ${user.lastName}|">Nombre Apellido</p>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Email</label>
                        <p class="form-control-plaintext" th:text="${user.email}">email@example.com</p>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Teléfono</label>
                        <p class="form-control-plaintext" th:text="${user.phone}">123456789</p>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Género</label>
                        <p class="form-control-plaintext">
                            <span class="badge bg-info text-dark" th:text="${user.gender.name()}">GENDER</span>
                        </p>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <h5 class="card-title mb-4">Información de Cuenta</h5>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Rol</label>
                        <p class="form-control-plaintext">
                            <span class="badge" 
                                  th:classappend="${user.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                                  th:text="${user.role.name()}">ROLE</span>
                        </p>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Fecha de Nacimiento</label>
                        <p class="form-control-plaintext" th:text="${#temporals.format(user.birthday, 'dd/MM/yyyy')}">01/01/1990</p>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Fecha de Creación</label>
                        <p class="form-control-plaintext" th:text="${#temporals.format(user.creationDate, 'dd/MM/yyyy HH:mm')}">01/01/2023 12:00</p>
                    </div>
                    
                    <div class="mb-3" th:if="${user.paymentMethod}">
                        <label class="form-label text-muted">Método de Pago</label>
                        <p class="form-control-plaintext">
                            <span class="badge bg-success" th:text="${user.paymentMethod.name()}">PAYMENT_METHOD</span>
                        </p>
                    </div>
                </div>
            </div>
            
            <div class="mt-4 pt-4 border-top" th:if="${user.addresses != null and #lists.size(user.addresses) > 0}">
                <h5 class="card-title mb-3">Direcciones Asociadas</h5>
                <div class="row">
                    <div class="col-md-6 mb-3" th:each="address : ${user.addresses}">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-subtitle mb-2">
                                    <span class="badge bg-secondary" th:text="${address.addressType.name()}">TYPE</span>
                                </h6>
                                <p class="card-text">
                                    <span th:text="|${address.street} ${address.number}|">Calle 123</span><br>
                                    <span th:if="${address.complement}" th:text="${address.complement}">Complemento</span><br>
                                    <span th:text="|${address.city}, ${address.state}|">Ciudad, Estado</span><br>
                                    <span th:text="|${address.country} - ${address.zipCode}|">País - CP</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
