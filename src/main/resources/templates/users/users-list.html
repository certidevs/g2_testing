<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/head :: head('Usuarios')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{layout/navbar :: navbar}"></nav>
<main class="container flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">
            <i class="fa-solid fa-users text-primary me-2"></i>Usuarios
        </h1>
        <span class="badge bg-secondary fs-6" th:text="|${#lists.size(users)} resultados|">0 resultados</span>
    </div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(users)}">
        No hay usuarios disponibles por ahora.
    </div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(users)}">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Rol</th>
                    <th>Género</th>
                    <th class="text-end">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td>
                        <div class="fw-semibold" th:text="|${user.name} ${user.lastName}|">Nombre Apellido</div>
                    </td>
                    <td>
                        <span class="text-muted" th:text="${user.email}">email@example.com</span>
                    </td>
                    <td>
                        <span class="text-muted" th:text="${user.phone}">123456789</span>
                    </td>
                    <td>
                        <span class="badge" 
                              th:classappend="${user.role.name() == 'ADMIN' ? 'bg-danger' : 'bg-primary'}"
                              th:text="${user.role.name()}">ROLE</span>
                    </td>
                    <td>
                        <span class="badge bg-info text-dark" th:text="${user.gender.name()}">GENDER</span>
                    </td>
                    <td class="text-end">
                        <a th:href="|/users/${user.id}|" class="btn btn-sm btn-outline-primary">
                            <i class="fa-solid fa-eye"></i> Ver
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
